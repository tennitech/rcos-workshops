<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Agent Boss Presentation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.174.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.174.0/examples/jsm/"
      }
    }
  </script>

  <style>
    @font-face {
      font-family: 'GeistPixelSquare';
      src: url('fonts/GeistPixel-Square.otf') format('opentype');
    }

    @font-face {
      font-family: 'GeistPixelLine';
      src: url('fonts/GeistPixel-Line.otf') format('opentype');
    }

    /* Base Reset & Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    .scene {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      visibility: hidden;
      opacity: 0;
    }

    .scene[style*="visibility: hidden"] {
      opacity: 0 !important;
    }

    .hero {
      position: absolute;
      inset: 0;
      z-index: 12;
      padding: clamp(28px, 4vw, 48px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
    }

    .prompt-panel {
      width: min(680px, 88vw);
      margin: 0 auto;
      padding-top: clamp(36px, 10vh, 120px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 22px;
      pointer-events: auto;
    }

    .conversation-lane {
      min-height: 190px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      justify-content: flex-end;
      align-items: center;
      pointer-events: none;
    }

    .conversation-item {
      max-width: min(560px, 78vw);
      width: fit-content;
      padding: 14px 18px;
      border-radius: 24px;
      border: 1px solid rgba(170, 224, 255, 0.14);
      background:
        linear-gradient(180deg, rgba(10, 24, 40, 0.66), rgba(4, 13, 24, 0.5)),
        radial-gradient(circle at top, rgba(180, 236, 255, 0.14), transparent 62%);
      box-shadow: 0 18px 56px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      font-size: 14px;
      line-height: 1.6;
      color: rgba(224, 244, 255, 0.9);
      font-family: 'DM Sans', 'Inter', sans-serif;
      font-weight: 300;
      letter-spacing: -0.04em;
      will-change: transform, opacity, filter;
    }

    .conversation-item.user {
      color: rgba(236, 249, 255, 0.96);
    }

    .conversation-item.status {
      color: rgba(168, 190, 205, 0.54);
      background:
        linear-gradient(180deg, rgba(22, 28, 34, 0.72), rgba(11, 16, 22, 0.62)),
        radial-gradient(circle at top, rgba(156, 176, 190, 0.08), transparent 64%);
      border-color: rgba(153, 176, 192, 0.12);
    }

    .conversation-item.assistant {
      color: rgba(241, 252, 255, 0.98);
      text-shadow: 0 0 22px rgba(191, 247, 255, 0.12);
    }

    .conversation-dots {
      display: inline-flex;
      gap: 6px;
      margin-left: 10px;
      vertical-align: middle;
    }

    .conversation-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(210, 230, 240, 0.86);
      animation: promptDot 1.1s infinite ease-in-out;
    }

    .conversation-dots span:nth-child(2) {
      animation-delay: 0.14s;
    }

    .conversation-dots span:nth-child(3) {
      animation-delay: 0.28s;
    }

    .composer-shell {
      position: relative;
      overflow: visible;
      display: flex;
      align-items: center;
      gap: 12px;
      width: min(500px, 72vw);
      padding: 16px 16px 16px 24px;
      border-radius: 26px;
      border: 1px solid rgba(186, 236, 255, 0.16);
      background:
        linear-gradient(180deg, rgba(75, 97, 117, 0.2), rgba(36, 52, 67, 0.24)),
        linear-gradient(180deg, rgba(15, 30, 44, 0.78), rgba(10, 20, 31, 0.68));
      box-shadow: 0 22px 64px rgba(0, 0, 0, 0.28), 0 0 0 1px rgba(225, 249, 255, 0.04) inset;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      margin-inline: auto;
    }

    .composer-shell > * {
      position: relative;
      z-index: 3;
    }

    .composer-shell.is-focus-glow {
      animation: composerEdgeFlash 420ms cubic-bezier(0.2, 0.8, 0.2, 1) 1;
    }

    .composer-input {
      flex: 1;
      min-height: 30px;
      max-height: 96px;
      border: 0;
      resize: none;
      background: transparent;
      color: rgba(239, 252, 255, 0.96);
      font-size: clamp(16px, 1.9vw, 21px);
      line-height: 1.22;
      padding: 4px 2px 4px 0;
      outline: none;
      font-family: 'DM Sans', 'Inter', sans-serif;
      font-weight: 300;
      letter-spacing: -0.04em;
      caret-color: #ffffff;
      text-shadow:
        0 0 12px rgba(143, 232, 255, 0.16),
        0 0 28px rgba(143, 232, 255, 0.08);
    }

    .composer-input::placeholder {
      color: rgba(214, 233, 244, 0.68);
    }

    .composer-input:focus {
      text-shadow:
        0 0 16px rgba(190, 246, 255, 0.28),
        0 0 36px rgba(143, 232, 255, 0.18);
    }

    .composer-submit {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(189, 241, 255, 0.2);
      background: linear-gradient(180deg, rgba(229, 251, 255, 0.96), rgba(166, 232, 255, 0.94));
      color: #03131d;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 30px rgba(126, 220, 255, 0.24);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .composer-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 34px rgba(126, 220, 255, 0.28);
    }

    .composer-submit:disabled {
      opacity: 0.6;
      cursor: default;
      transform: none;
    }

    .composer-submit-arrow {
      font-size: 17px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .scene-grid {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.52)),
        linear-gradient(90deg, rgba(135, 195, 235, 0.05) 1px, transparent 1px),
        linear-gradient(180deg, rgba(135, 195, 235, 0.04) 1px, transparent 1px);
      background-size: auto, 72px 72px, 72px 72px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.26), transparent 72%);
    }

    @keyframes pulseDot {
      0%, 100% { transform: scale(0.9); opacity: 0.7; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    @keyframes promptDot {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.34; }
      40% { transform: translateY(-3px); opacity: 1; }
    }

    @keyframes composerEdgeFlash {
      0% {
        border-color: rgba(186, 236, 255, 0.16);
        box-shadow:
          0 22px 64px rgba(0, 0, 0, 0.28),
          0 0 0 1px rgba(225, 249, 255, 0.04) inset,
          0 0 0 rgba(143, 232, 255, 0);
      }
      36% {
        border-color: rgba(233, 252, 255, 0.98);
        box-shadow:
          0 22px 64px rgba(0, 0, 0, 0.28),
          0 0 0 1px rgba(225, 249, 255, 0.14) inset,
          0 0 14px rgba(143, 232, 255, 0.82),
          0 0 28px rgba(143, 232, 255, 0.44),
          0 0 46px rgba(143, 232, 255, 0.22);
      }
      100% {
        border-color: rgba(186, 236, 255, 0.16);
        box-shadow:
          0 22px 64px rgba(0, 0, 0, 0.28),
          0 0 0 1px rgba(225, 249, 255, 0.04) inset,
          0 0 0 rgba(143, 232, 255, 0);
      }
    }

    #waveCanvas {
      position: absolute;
      inset: 0;
      top: 0;
      left: -150px;
      right: -150px;
      width: calc(100% + 300px);
      height: 100%;
      bottom: 0;
      z-index: 1;
      will-change: transform;
      transform: translateZ(0);
      contain: layout paint style;
      content-visibility: auto;
    }

    #waveCanvas canvas {
      opacity: 0;
      transition: opacity .3s ease-out;
      will-change: opacity;
    }

    #footer {
      position: absolute;
      bottom: 16px;
      right: 24px;
      z-index: 10000;
      font-family: 'GeistPixelLine', 'Inter', sans-serif;
      font-size: 8.5px;
      color: rgba(255, 255, 255, 0.3);
      display: flex;
      align-items: center;
      gap: 5px;
      pointer-events: none;
      letter-spacing: 0.5px;
    }

    #footer img {
      height: 10px;
      filter: brightness(0) invert(1);
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div id="footer">
    Design from HP IQ. Remixed by Kaden Tennent. Made for <img src="rcos.png" alt="RCOS">
  </div>

  <div id="scene1" class="scene">
    <div class="scene-grid"></div>
    <div id="waveCanvas"></div>
    <div class="hero">
      <div class="prompt-panel">
        <div class="conversation-lane" id="conversationLane"></div>
        <form id="composerForm" class="composer-shell">
          <textarea
            id="composerInput"
            class="composer-input"
            rows="1"
            placeholder="What do you want to do?"
          ></textarea>
          <button type="submit" class="composer-submit" aria-label="Submit prompt">
            <span class="composer-submit-arrow">↑</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    // --- THREE Imports ---
    import * as THREE from "three";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
    import { ShaderPass } from "three/addons/postprocessing/ShaderPass.js";

    // --- Shaders (Film Grain & Simple Grain) ---
    const FilmGrainShader = {
      uniforms: {
        tDiffuse: { value: null },
        time: { value: 0 },
        intensity: { value: 1.1 },
        grainScale: { value: 0.5 }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        #ifdef GL_ES
          precision highp int;
          precision mediump float;
        #else
          precision mediump float;
        #endif
        uniform sampler2D tDiffuse;
        uniform float time;
        uniform float intensity;
        uniform float grainScale;
        varying vec2 vUv;

        float sparkleNoise(vec2 p) {
          vec2 jPos = p + vec2(37.0, 17.0) * fract(time * 0.07);
          vec3 p3 = fract(vec3(jPos.xyx) * vec3(.1031, .1030, .0973) + time * 0.1);
          p3 += dot(p3, p3.yxz + 19.19);
          return fract((p3.x + p3.y) * p3.z);
        }

        void main() {
          vec4 color = texture2D(tDiffuse, vUv);
          vec2 pos = gl_FragCoord.xy * 0.5 * grainScale;
          float noise = sparkleNoise(pos);
          noise = noise * 2.0 - 1.0;
          vec3 result = color.rgb + noise * intensity * 0.1;
          gl_FragColor = vec4(result, color.a);
        }
      `
    };

    function createFilmGrainPass(intensity = 0.9, grainScale = 0.3) {
      const pass = new ShaderPass(FilmGrainShader);
      pass.uniforms.intensity.value = intensity;
      pass.uniforms.grainScale.value = grainScale;
      return pass;
    }

    const signalModes = {
      idle: {
        kicker: "Signal Idle",
        title: "Ready for input",
        subtitle: "Submit a prompt to simulate processing, thinking, completion, and return-to-idle states.",
        meta: "No active request",
        dots: false
      },
      processing: {
        kicker: "Request Processing",
        title: "Processing request",
        subtitle: "A visible packet moves through the field as the request is routed and dispatched.",
        meta: "Stage 1 of 3",
        dots: true
      },
      flowing: {
        kicker: "Model Thinking",
        title: "Thinking",
        subtitle: "Internal reasoning intensifies while the waveform accelerates and tightens.",
        meta: "Stage 2 of 3",
        dots: true
      },
      settled: {
        kicker: "Response Complete",
        title: "Completed",
        subtitle: "The field spikes, resolves, and eases back into idle drift.",
        meta: "Stage 3 of 3",
        dots: false
      }
    };


    // --- Wave State & Keyframes ---
    const wave1 = { gain: 10, frequency: 0, waveLength: 0.5, currentAngle: 0 };
    const wave2 = { gain: 0, frequency: 0, waveLength: 0.5, currentAngle: 0 };

    const waveKeyframes1 = [
      { time: 0, gain: 10, frequency: 0, waveLength: 0.5 },
      { time: 4, gain: 300, frequency: 1, waveLength: 0.5 },
      { time: 6, gain: 300, frequency: 4, waveLength: Math.PI * 1.5 },
      { time: 8, gain: 225, frequency: 4, waveLength: Math.PI * 1.5 },
      { time: 10, gain: 500, frequency: 1, waveLength: Math.PI * 1.5 },
      { time: 14, gain: 225, frequency: 3, waveLength: Math.PI * 1.5 },
      { time: 22, gain: 100, frequency: 6, waveLength: Math.PI * 1.5 },
      { time: 28, gain: 0, frequency: 0.9, waveLength: 0.5 },
      { time: 30, gain: 128, frequency: 0.9, waveLength: 0.5 },
      { time: 32, gain: 190, frequency: 1.42, waveLength: 0.5 },
      { time: 39, gain: 499, frequency: 4.0, waveLength: Math.PI * 1.5 },
      { time: 40, gain: 500, frequency: 4.0, waveLength: Math.PI * 1.5 },
      { time: 42, gain: 400, frequency: 2.82, waveLength: Math.PI * 1.5 },
      { time: 44, gain: 327, frequency: 2.56, waveLength: Math.PI * 1.5 },
      { time: 48, gain: 188, frequency: 5.4, waveLength: 0.5 },
      { time: 52, gain: 32, frequency: 0.1, waveLength: 0.5 },
      { time: 55, gain: 10, frequency: 0, waveLength: 0.5 }
    ];
    const waveKeyframes2 = [
      { time: 0, gain: 0, frequency: 0, waveLength: 0.5 },
      { time: 9, gain: 0, frequency: 0, waveLength: 0.5 },
      { time: 10, gain: 400, frequency: 1, waveLength: 0.5 },
      { time: 13, gain: 300, frequency: 4, waveLength: Math.PI * 1.5 },
      { time: 24, gain: 96, frequency: 2, waveLength: 0.5 },
      { time: 28, gain: 0, frequency: 0.9, waveLength: 0.5 },
      { time: 30, gain: 142, frequency: 0.9, waveLength: 0.5 },
      { time: 36, gain: 374, frequency: 4.0, waveLength: Math.PI * 1.5 },
      { time: 38, gain: 375, frequency: 4.0, waveLength: Math.PI * 1.5 },
      { time: 40, gain: 300, frequency: 2.26, waveLength: Math.PI * 1.5 },
      { time: 44, gain: 245, frequency: 2.05, waveLength: Math.PI * 1.5 },
      { time: 48, gain: 141, frequency: 5.12, waveLength: 0.5 },
      { time: 52, gain: 24, frequency: 0.08, waveLength: 0.5 },
      { time: 55, gain: 8, frequency: 0, waveLength: 0.5 }
    ];

    // --- Mouse, Glow & Flow Config ---
    const mouse = { x: 0, y: 0, active: false };
    let proxyMouseX = 0, proxyMouseY = 0, proxyInitialized = false;
    const flowState = { pos: -0.22, width: 0.18, boost: 0.06, amp: 0.02, alpha: 0.1, drift: 0.014 };
    const lightingState = { baseEmissive: 0.13 };
    const visualState = { coverage: 0.22 };

    const motionPresets = {
      idle: {
        wave1: { gain: 28, frequency: 0.18, waveLength: 1.1 },
        wave2: { gain: 18, frequency: 0.12, waveLength: 0.84 },
        flow: { width: 0.18, boost: 0.06, amp: 0.02, alpha: 0.1, drift: 0.014 },
        light: 0.13,
        coverage: 0.22
      },
      processing: {
        wave1: { gain: 58, frequency: 1.02, waveLength: 0.78 },
        wave2: { gain: 42, frequency: 0.72, waveLength: 1.02 },
        flow: { width: 0.075, boost: 0.52, amp: 0.18, alpha: 0.44, drift: 0.36 },
        light: 0.165,
        coverage: 0.28
      },
      thinking: {
        wave1: { gain: 116, frequency: 1.86, waveLength: 2.18 },
        wave2: { gain: 94, frequency: 1.48, waveLength: 1.72 },
        flow: { width: 0.14, boost: 0.18, amp: 0.09, alpha: 0.18, drift: 0.05 },
        light: 0.165,
        coverage: 0.39
      }
    };

    const glowConfig = { maxGlowDistance: 690, speedScale: 0.52, fadeSpeed: 4.4, glowFalloff: 0.6, mouseSmoothing: 30.0 };
    const glowDynamics = { accumulation: 1.2, decay: 3.3, max: 40.0, accumEase: 1.5, speedEase: 8.5 };

    let barCenters = null;
    function updateGlowDistance() {
      if (!barMaterial) return;
      const totalWidth = currentBarCount * (FIXED_BAR_WIDTH + FIXED_BAR_GAP) - FIXED_BAR_GAP;
      const spanPx = totalWidth * 0.3;
      glowConfig.maxGlowDistance = spanPx;
      barMaterial.uniforms.uMaxGlowDist.value = spanPx;
    }

    function accumulateGlow(dt) {
      if (!instancedBars) return;
      const attr = instancedBars.geometry.getAttribute("aGlow");
      const arr = attr.array;

      const mouseWorldX = proxyMouseX - cameraWidth * 0.5;
      const mDist = glowConfig.maxGlowDistance;
      const fall = glowConfig.glowFalloff;

      const decayLerp = 1.0 - Math.exp(-glowDynamics.decay * dt);
      const addEase = 1.0 - Math.exp(-glowDynamics.accumEase * dt);
      const vmax = glowDynamics.max;

      for (let i = 0; i < currentBarCount; i++) {
        const dx = Math.abs(mouseWorldX - barCenters[i]);
        const hit = (dx < mDist) ? 1.0 - Math.pow(dx / mDist, fall) : 0.0;
        const targetAdd = hit * smoothSpeed;
        const add = targetAdd * addEase;
        let g = arr[i] + add - (arr[i] * decayLerp);
        if (g > vmax) g = vmax;
        arr[i] = arr[i + currentBarCount] = g;
      }
      attr.needsUpdate = true;
    }

    // --- THREE.js Setup ---
    let DPR_CAP = 2;
    const mm = gsap.matchMedia();
    mm.add("(max-resolution: 180dpi)", () => { DPR_CAP = 1.5; });
    const PR = Math.min(window.devicePixelRatio, DPR_CAP);
    const EFFECT_PR = Math.min(window.devicePixelRatio, DPR_CAP) * 0.5;

    const waveContainer = document.getElementById("waveCanvas");
    const waveRenderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
    waveRenderer.setPixelRatio(EFFECT_PR);
    waveRenderer.toneMapping = THREE.ACESFilmicToneMapping;
    waveRenderer.toneMappingExposure = 1.0;
    waveRenderer.autoClear = false
    waveContainer.appendChild(waveRenderer.domElement);

    const waveScene = new THREE.Scene();
    let waveCamera, waveComposer, waveRenderPass, waveBloomPass, grainPass;
    let cameraWidth = 0, cameraHeight = 0, waveCameraInitialized = false;
    waveScene.fog = null;
    waveScene.add(new THREE.AmbientLight(0xffffff, 0.2));

    let setMouseNDC, setSmoothSpeed, setPhase1, setPhase2;

    const MAX_BARS = 100;
    const FIXED_BAR_WIDTH = 14;
    const FIXED_BAR_GAP = 10;
    let instancedBars, currentBarCount = 0, barMaterial;

    function createInstancedBars() {
      if (instancedBars) {
        waveScene.remove(instancedBars);
        instancedBars.geometry.dispose();
        instancedBars.material.dispose();
        instancedBars = null;
      }

      const waveWidth = cameraWidth * 1;
      const gap = FIXED_BAR_GAP;
      const barCount = Math.min(MAX_BARS, Math.max(1, Math.floor((waveWidth + gap) / (FIXED_BAR_WIDTH + gap))));
      currentBarCount = barCount;

      const totalW = barCount * (FIXED_BAR_WIDTH + gap) - gap;
      const startX = -totalW / 2 - 150;
      const instCnt = barCount * 2;
      barCenters = new Float32Array(barCount);

      const aXPos = new Float32Array(instCnt);
      const aPosNorm = new Float32Array(instCnt);
      const aGroup = new Float32Array(instCnt);
      const aGlow = new Float32Array(instCnt).fill(0);

      for (let i = 0; i < barCount; i++) {
        const x = startX + FIXED_BAR_WIDTH / 2 + i * (FIXED_BAR_WIDTH + gap);
        barCenters[i] = x;
        const t = barCount > 1 ? i / (barCount - 1) : 0;
        aXPos[i] = x; aXPos[i + barCount] = x;
        aPosNorm[i] = t; aPosNorm[i + barCount] = t;
        aGroup[i] = 0; aGroup[i + barCount] = 1;
      }

      const geo = new THREE.PlaneGeometry(FIXED_BAR_WIDTH, 1, 1, 1);
      geo.translate(0, 0.5, 0);
      geo.setAttribute("aXPos", new THREE.InstancedBufferAttribute(aXPos, 1));
      geo.setAttribute("aPosNorm", new THREE.InstancedBufferAttribute(aPosNorm, 1));
      geo.setAttribute("aGroup", new THREE.InstancedBufferAttribute(aGroup, 1));
      geo.setAttribute("aGlow", new THREE.InstancedBufferAttribute(aGlow, 1).setUsage(THREE.DynamicDrawUsage));

      barMaterial = createInstancedMaterial();
      instancedBars = new THREE.InstancedMesh(geo, barMaterial, instCnt);
      instancedBars.frustumCulled = false;
      waveScene.add(instancedBars);

      setupQuickSetters();
      updateGlowDistance();
    }

    function createInstancedMaterial() {
      const baseCol = new THREE.Color("#9FDBFF");
      const emisCol = new THREE.Color("#E6FDFF");

      return new THREE.ShaderMaterial({
        defines: { USE_INSTANCING: '' },
        uniforms: {
          uMouseClipX: { value: 0 },
          uHalfW: { value: 0 },
          uMaxGlowDist: { value: glowConfig.maxGlowDistance },
          uGlowFalloff: { value: glowConfig.glowFalloff },
          uSmoothSpeed: { value: 0 },
          uGainMul: { value: 1 },
          uBaseY: { value: 0 },
          w1Gain: { value: wave1.gain },
          w1Len: { value: wave1.waveLength },
          w1Phase: { value: 0 },
          w2Gain: { value: wave2.gain },
          w2Len: { value: wave2.waveLength },
          w2Phase: { value: 0 },
          uFixedTipPx: { value: 10 },
          uMinBottomWidthPx: { value: 0 },
          uColor: { value: baseCol },
          uEmissive: { value: emisCol },
          uBaseEmissive: { value: lightingState.baseEmissive },
          uRotationAngle: { value: 0.0 },
          uFlowPos: { value: flowState.pos },
          uFlowWidth: { value: flowState.width },
          uFlowBoost: { value: flowState.boost },
          uFlowAmp: { value: flowState.amp },
          uFlowAlpha: { value: flowState.alpha }
        },
        vertexShader: `
          attribute float aXPos, aPosNorm, aGroup, aGlow;
          uniform float uMouseClipX, uHalfW, uMaxGlowDist, uGlowFalloff;
          uniform float uGainMul, uBaseY;
          uniform float w1Gain, w1Len, w1Phase;
          uniform float w2Gain, w2Len, w2Phase;
          uniform float uRotationAngle, uFlowPos, uFlowWidth, uFlowBoost, uFlowAmp;
          varying float vGlow, vPulse, vHeight, vFlow;
          varying vec2 vUv;

          float sineH(float g, float len, float ph, float t){
            return max(20.0, (sin(ph + t * len) * 0.5 + 0.6) * g * uGainMul);
          }

          void main(){
            vUv = uv;
            float h1 = sineH(w1Gain, w1Len, w1Phase, aPosNorm);
            float h2 = sineH(w2Gain, w2Len, w2Phase, aPosNorm);
            vHeight = mix(h1, h2, aGroup);
            float flowSpread = max(uFlowWidth, 0.001);
            float flowDelta = (aPosNorm - uFlowPos) / flowSpread;
            float flowEnvelope = exp(-flowDelta * flowDelta * 2.8) * uFlowBoost;
            vFlow = flowEnvelope;
            vHeight *= 1.0 + flowEnvelope * uFlowAmp;

            vec3 pos = position;
            pos.x += aXPos;
            pos.y = 0.0;

            float height = vHeight * uv.y;
            pos.x += height * tan(uRotationAngle);
            pos.y += height;

            pos.y += uBaseY;

            vec4 clip = projectionMatrix * modelViewMatrix * vec4(pos,1.0);
            float dxPx = abs(uMouseClipX - clip.x/clip.w) * uHalfW;
            float prox = clamp(1.0 - pow(dxPx / uMaxGlowDist, uGlowFalloff), 0.0, 1.0);

            vGlow  = aGlow;
            vPulse = prox;
            gl_Position = clip;
          }
        `,
        fragmentShader: `
          #ifdef GL_ES
            precision highp int;
            precision mediump float;
          #else
            precision mediump float;
          #endif
          uniform vec3 uColor, uEmissive;
          uniform float uBaseEmissive, uFlowAlpha;
          uniform float uFixedTipPx, uMinBottomWidthPx;
          varying float vGlow, vPulse, vHeight, vFlow;
          varying vec2 vUv;

          void main(){
            float tipProp = clamp(uFixedTipPx / vHeight, 0.0, 0.95);
            float transitionY = 1.0 - tipProp;
            float xFromCenter = abs(vUv.x - 0.5) * 2.0;
            float px = fwidth(vUv.x);
            float allowedWidth;

            if (vUv.y >= transitionY){
              float topPos = (vUv.y - transitionY) / tipProp;
              allowedWidth = 1.0 - pow(topPos, 0.9);
            } else {
              float bottomPos = vUv.y / transitionY;
              allowedWidth = max(uMinBottomWidthPx * px * 10.0, pow(bottomPos, 0.5));
            }

            float alpha = smoothstep(-px, px, allowedWidth - xFromCenter);
            if (alpha < 0.01) discard;

            float core = pow(1.0 - xFromCenter, 2.2);
            float flowCore = vFlow * (0.65 + core * 0.85) * (0.4 + uFlowAlpha * 0.6);
            float emissiveStrength = uBaseEmissive + vGlow * 0.55 + vPulse * 0.1 + flowCore * 1.45;
            vec3 finalColor = uColor + uEmissive * emissiveStrength;
            float finalAlpha = (0.24 + vGlow * 0.01 + flowCore * 0.16) * alpha;
            gl_FragColor = vec4(finalColor, finalAlpha);
          }
        `,
        side: THREE.FrontSide,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
    }

    function setupQuickSetters() {
      const u = instancedBars.material.uniforms;
      setMouseNDC = gsap.quickSetter(u.uMouseClipX, 'value');
      setSmoothSpeed = gsap.quickSetter(u.uSmoothSpeed, 'value');
      setPhase1 = gsap.quickSetter(u.w1Phase, 'value');
      setPhase2 = gsap.quickSetter(u.w2Phase, 'value');
    }

    const MAX_KEYFRAME_GAIN = 500;
    function updateGainMultiplier() {
      if (!barMaterial) return;
      const targetPx = cameraHeight * visualState.coverage;
      barMaterial.uniforms.uGainMul.value = targetPx / MAX_KEYFRAME_GAIN;
    }

    // --- Pointer Tracking ---
    function setupPointerTracking() {
      const el = waveRenderer.domElement;
      const readCoords = (e) => {
        if ("clientX" in e) return { x: e.clientX, y: e.clientY };
        const t = e.touches?.[0] || e.changedTouches?.[0];
        return t ? { x: t.clientX, y: t.clientY } : { x: mouse.x, y: mouse.y };
      };
      const updatePos = (e, active) => {
        const { x, y } = readCoords(e);
        const r = rect;
        mouse.x = x - r.left;
        mouse.y = y - r.top;
        mouse.active = active;
        if (!proxyInitialized) {
          proxyMouseX = mouse.x;
          proxyMouseY = mouse.y;
          proxyInitialized = true;
        }
      };
      const activate = (e) => updatePos(e, true);
      const move = (e) => updatePos(e, true);
      const deactivate = () => { mouse.active = false; };

      el.addEventListener("pointerdown", activate, { passive: true });
      el.addEventListener("pointermove", move, { passive: true });
      window.addEventListener("pointerup", deactivate, { passive: true });
      el.addEventListener("pointerleave", deactivate, { passive: true });

      el.addEventListener("touchstart", activate, { passive: true });
      el.addEventListener("touchmove", move, { passive: true });
      window.addEventListener("touchend", deactivate, { passive: true });
      window.addEventListener("touchcancel", deactivate, { passive: true });
    }

    // --- GSAP Ticker (Update Loop) ---
    let smoothSpeed = 0;
    let rect = waveRenderer.domElement.getBoundingClientRect();

    gsap.ticker.add(() => {
      if (!waveCameraInitialized || !instancedBars) return;
      const dt = gsap.ticker.deltaRatio() * (1 / 60);

      wave1.currentAngle = (wave1.currentAngle + wave1.frequency * dt) % (Math.PI * 2);
      wave2.currentAngle = (wave2.currentAngle + wave2.frequency * dt) % (Math.PI * 2);
      setPhase1(wave1.currentAngle);
      setPhase2(wave2.currentAngle);

      const kMouse = 1.0 - Math.exp(-glowConfig.mouseSmoothing * dt);
      proxyMouseX += (mouse.x - proxyMouseX) * kMouse;
      proxyMouseY += (mouse.y - proxyMouseY) * kMouse;

      const dx = mouse.active ? (mouse.x - proxyMouseX) : 0;
      const dy = mouse.active ? (mouse.y - proxyMouseY) : 0;
      const rawSpeed = Math.hypot(dx, dy * 0.1) * glowConfig.speedScale;

      const kSpeed = 1.0 - Math.exp(-glowDynamics.speedEase * dt);
      smoothSpeed += (rawSpeed - smoothSpeed) * kSpeed;
      setSmoothSpeed(smoothSpeed);

      const u = instancedBars.material.uniforms;
      u.w1Gain.value = wave1.gain;
      u.w1Len.value = wave1.waveLength;
      u.w2Gain.value = wave2.gain;
      u.w2Len.value = wave2.waveLength;
      flowState.pos += flowState.drift * dt;
      if (flowState.pos > 1.35) flowState.pos = -0.25;
      u.uBaseEmissive.value = lightingState.baseEmissive;
      u.uGainMul.value = (cameraHeight * visualState.coverage) / MAX_KEYFRAME_GAIN;
      u.uFlowPos.value = flowState.pos;
      u.uFlowWidth.value = flowState.width;
      u.uFlowBoost.value = flowState.boost;
      u.uFlowAmp.value = flowState.amp;
      u.uFlowAlpha.value = flowState.alpha;

      const mouseClipX = (proxyMouseX / cameraWidth) * 2 - 1;
      setMouseNDC(mouseClipX);
      let baseOffset = 40;
      if (window.innerWidth < 768) {
        baseOffset = 20;
      }
      u.uBaseY.value = -cameraHeight * 0.5 + baseOffset;

      grainPass.uniforms.time.value += dt * 0.2;

      accumulateGlow(dt);
      waveComposer.render();
    });

    // --- Keyframe Tweens ---
    function buildKeyframeTweens(target, keyframes) {
      const tl = gsap.timeline();
      for (let i = 0; i < keyframes.length - 1; i++) {
        const cur = keyframes[i];
        const nxt = keyframes[i + 1];
        const duration = nxt.time - cur.time;
        tl.to(target, {
          gain: nxt.gain,
          frequency: nxt.frequency,
          waveLength: nxt.waveLength,
          duration,
          ease: "power2.inOut"
        }, cur.time);
      }
      return tl;
    }

    const conversationLaneEl = document.getElementById("conversationLane");
    const composerFormEl = document.getElementById("composerForm");
    const composerInputEl = document.getElementById("composerInput");
    const composerSubmitEl = composerFormEl.querySelector(".composer-submit");
    let requestCycleTl = null;
    let completionTl = null;
    let activeReplyItem = null;

    function applyMotionPreset(presetName, duration = 1.1, ease = "power2.inOut") {
      const preset = motionPresets[presetName];
      if (!preset) return;
      gsap.to(wave1, { ...preset.wave1, duration, ease, overwrite: true });
      gsap.to(wave2, { ...preset.wave2, duration, ease, overwrite: true });
      gsap.to(flowState, { ...preset.flow, duration, ease, overwrite: true });
      gsap.to(lightingState, { baseEmissive: preset.light, duration, ease, overwrite: true });
      gsap.to(visualState, { coverage: preset.coverage, duration, ease, overwrite: true });
    }

    function setExperienceState(stateKey) {
      if (stateKey === "idle") {
        applyMotionPreset("idle", 1.6, "sine.inOut");
      } else if (stateKey === "processing") {
        applyMotionPreset("processing", 0.7, "power2.out");
      } else if (stateKey === "flowing") {
        applyMotionPreset("thinking", 0.9, "power2.out");
      }
    }

    function runCompletionBurst() {
      if (completionTl) {
        completionTl.kill();
        completionTl = null;
      }
      const alignedPhase = (wave1.currentAngle + wave2.currentAngle) * 0.5;
      wave1.currentAngle = alignedPhase;
      wave2.currentAngle = alignedPhase;
      if (setPhase1) setPhase1(alignedPhase);
      if (setPhase2) setPhase2(alignedPhase);
      gsap.killTweensOf([wave1, wave2, flowState, lightingState, visualState]);
      completionTl = gsap.timeline({
        onComplete: () => {
          completionTl = null;
          setExperienceState("idle");
        }
      });
      completionTl.to(wave1, {
        gain: 104,
        frequency: 0.0,
        waveLength: 0.0,
        duration: 0.42,
        ease: "sine.inOut"
      }, 0);
      completionTl.to(wave2, {
        gain: 104,
        frequency: 0.0,
        waveLength: 0.0,
        duration: 0.42,
        ease: "sine.inOut"
      }, 0);
      completionTl.to(flowState, {
        pos: 0.5,
        width: 0.34,
        boost: 0.0,
        amp: 0.0,
        alpha: 0.0,
        drift: 0.0,
        duration: 0.42,
        ease: "sine.inOut"
      }, 0);
      completionTl.to(lightingState, {
        baseEmissive: 0.175,
        duration: 0.42,
        ease: "sine.inOut"
      }, 0);
      completionTl.to(visualState, {
        coverage: 0.35,
        duration: 0.42,
        ease: "sine.inOut"
      }, 0);

      completionTl.to(wave1, {
        gain: 228,
        frequency: 0.0,
        waveLength: 0.0,
        duration: 0.82,
        ease: "sine.inOut"
      }, 0.42);
      completionTl.to(wave2, {
        gain: 228,
        frequency: 0.0,
        waveLength: 0.0,
        duration: 0.82,
        ease: "sine.inOut"
      }, 0.42);
      completionTl.to(flowState, {
        pos: 0.5,
        width: 0.84,
        boost: 0.0,
        amp: 0.0,
        alpha: 0.0,
        drift: 0.0,
        duration: 0.82,
        ease: "sine.inOut"
      }, 0.42);
      completionTl.to(lightingState, {
        baseEmissive: 0.225,
        duration: 0.82,
        ease: "sine.inOut"
      }, 0.42);
      completionTl.to(visualState, {
        coverage: 0.5,
        duration: 0.82,
        ease: "sine.inOut"
      }, 0.42);

      completionTl.to(wave1, {
        gain: 260,
        frequency: 0.0,
        waveLength: 0.0,
        duration: 0.24,
        ease: "sine.out"
      }, 1.24);
      completionTl.to(wave2, {
        gain: 260,
        frequency: 0.0,
        waveLength: 0.0,
        duration: 0.24,
        ease: "sine.out"
      }, 1.24);
      completionTl.to(flowState, {
        pos: 0.5,
        width: 0.95,
        boost: 0.0,
        amp: 0.0,
        alpha: 0.0,
        drift: 0.0,
        duration: 0.24,
        ease: "sine.out"
      }, 1.24);
      completionTl.to(lightingState, {
        baseEmissive: 0.26,
        duration: 0.24,
        ease: "sine.out"
      }, 1.24);
      completionTl.to(visualState, {
        coverage: 0.58,
        duration: 0.24,
        ease: "sine.out"
      }, 1.24);
      completionTl.to(wave1, { ...motionPresets.idle.wave1, gain: 42, frequency: 0.0, waveLength: 0.0, duration: 2.8, ease: "power2.inOut" }, 1.52);
      completionTl.to(wave2, { ...motionPresets.idle.wave2, gain: 42, frequency: 0.0, waveLength: 0.0, duration: 2.8, ease: "power2.inOut" }, 1.52);
      completionTl.to(flowState, { ...motionPresets.idle.flow, pos: 0.5, duration: 3.0, ease: "power2.inOut" }, 1.52);
      completionTl.to(lightingState, { baseEmissive: motionPresets.idle.light, duration: 2.9, ease: "power2.inOut" }, 1.52);
      completionTl.to(visualState, { coverage: motionPresets.idle.coverage, duration: 2.9, ease: "power2.inOut" }, 1.52);
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function buildFakeResponse(promptText) {
      return `Simulated output for "${promptText.trim().replace(/\s+/g, " ")}". The request passes through routing, shifts into a denser thinking rhythm, then resolves into a clean completion rise before easing back to idle.`;
    }

    function autoSizeComposer() {
      composerInputEl.style.height = "34px";
      composerInputEl.style.height = `${Math.min(Math.max(composerInputEl.scrollHeight, 34), 72)}px`;
    }

    function setConversationText(element, text, withDots = false) {
      const safeText = escapeHtml(text);
      element.innerHTML = withDots
        ? `${safeText}<span class="conversation-dots"><span></span><span></span><span></span></span>`
        : safeText;
    }

    function createConversationItem(kind, text, withDots = false) {
      const item = document.createElement("div");
      item.className = `conversation-item ${kind}`;
      setConversationText(item, text, withDots);
      conversationLaneEl.appendChild(item);
      return item;
    }

    function animateConversationEntry(item, options = {}) {
      const from = options.from ?? { opacity: 0, y: 18, scale: 0.98, filter: "blur(10px)" };
      const to = options.to ?? { opacity: 1, y: 0, scale: 1, filter: "blur(0px)", duration: 1.2, ease: "power3.out" };
      gsap.fromTo(item, from, to);
    }

    function transitionConversationItem(item, kind, text, withDots = false) {
      gsap.killTweensOf(item);
      gsap.to(item, {
        opacity: 0,
        y: -10,
        filter: "blur(10px)",
        duration: 0.55,
        ease: "power2.in",
        onComplete: () => {
          item.className = `conversation-item ${kind}`;
          setConversationText(item, text, withDots);
          gsap.fromTo(item, {
            opacity: 0,
            y: 10,
            filter: "blur(10px)"
          }, {
            opacity: 1,
            y: 0,
            filter: "blur(0px)",
            duration: 1.25,
            ease: "power2.out"
          });
        }
      });
    }

    function collapseComposerShell() {
      composerFormEl.style.pointerEvents = "none";
      gsap.to(composerFormEl, {
        opacity: 0,
        y: 18,
        scale: 0.96,
        filter: "blur(16px)",
        duration: 0.6,
        ease: "power2.inOut"
      });
    }

    function runFakeRequest(promptText) {
      if (requestCycleTl) {
        requestCycleTl.kill();
        requestCycleTl = null;
      }
      if (completionTl) {
        completionTl.kill();
        completionTl = null;
      }
      if (activeReplyItem) {
        activeReplyItem = null;
      }

      const userItem = createConversationItem("user", promptText);
      const statusItem = createConversationItem("status", signalModes.processing.title, true);
      activeReplyItem = statusItem;
      animateConversationEntry(userItem, {
        from: { opacity: 0, y: 28, scale: 1.02, filter: "blur(14px)" },
        to: { opacity: 1, y: 0, scale: 0.97, filter: "blur(0px)", duration: 1.05, ease: "power3.out" }
      });
      animateConversationEntry(statusItem, {
        from: { opacity: 0, y: 18, scale: 0.98, filter: "blur(12px)" },
        to: { opacity: 1, y: 0, scale: 1, filter: "blur(0px)", duration: 1.0, ease: "power3.out", delay: 0.12 }
      });

      requestCycleTl = gsap.timeline({
        onComplete: () => {
          requestCycleTl = null;
        }
      });

      composerInputEl.disabled = true;
      composerSubmitEl.disabled = true;
      collapseComposerShell();

      requestCycleTl.call(() => setExperienceState("processing"));
      requestCycleTl.to({}, { duration: 2.6 });
      requestCycleTl.call(() => {
        transitionConversationItem(statusItem, "status", signalModes.flowing.title, true);
      });
      requestCycleTl.to({}, { duration: 0.6 });
      requestCycleTl.call(() => {
        setExperienceState("flowing");
      });
      requestCycleTl.to({}, { duration: 3.8 });
      requestCycleTl.call(() => {
        runCompletionBurst();
      });
      requestCycleTl.to({}, { duration: 0.52 });
      requestCycleTl.call(() => {
        transitionConversationItem(statusItem, "assistant", buildFakeResponse(promptText), false);
      });
      requestCycleTl.to({}, { duration: 4.2 });
    }

    function animateHeroIntro() {
      const promptPanel = document.querySelector(".prompt-panel");
      const heroItems = document.querySelectorAll(".conversation-lane, .composer-shell");

      gsap.set(heroItems, { opacity: 0, y: 22, filter: "blur(12px)" });

      const tl = gsap.timeline();
      tl.to(heroItems, {
        opacity: 1,
        y: 0,
        filter: "blur(0px)",
        duration: 1.1,
        stagger: 0.08,
        ease: "power3.out"
      }, 0.25);
      tl.to(promptPanel, {
        y: "-=6",
        duration: 3.6,
        ease: "sine.inOut",
        repeat: -1,
        yoyo: true
      }, 1.2);
    }

    function attachFakeRuntimeHandlers() {
      composerFormEl.addEventListener("submit", (event) => {
        event.preventDefault();
        const promptText = composerInputEl.value.trim();
        if (!promptText) return;
        runFakeRequest(promptText);
      });

      composerInputEl.addEventListener("input", autoSizeComposer);
      composerInputEl.addEventListener("focus", () => {
        composerFormEl.classList.remove("is-focus-glow");
        void composerFormEl.offsetWidth;
        composerFormEl.classList.add("is-focus-glow");
      });
      composerFormEl.addEventListener("animationend", (event) => {
        if (event.animationName === "composerEdgeFlash") {
          composerFormEl.classList.remove("is-focus-glow");
        }
      });
      composerInputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          composerFormEl.requestSubmit();
        }
      });
    }

    function showScene1() {
      gsap.set("#scene1", { visibility: "visible", opacity: 0 });

      if (!waveCameraInitialized) {
        initWaveThree();
        onResize(waveContainer.clientWidth, waveContainer.clientHeight);
      }

      gsap.to("#waveCanvas canvas", {
        opacity: 1,
        duration: 1,
        ease: "power2.out"
      });

      gsap.to("#scene1", { opacity: 1, duration: 1, ease: "power2.out" });
    }

    // --- Init & Resize ---
    function initWaveThree() {
      cameraWidth = waveContainer.clientWidth;
      cameraHeight = waveContainer.clientHeight;
      waveCamera = new THREE.OrthographicCamera(
        -cameraWidth / 2, cameraWidth / 2,
        cameraHeight / 2, -cameraHeight / 2,
        -1000, 1000
      );
      waveCamera.position.z = 10;
      waveCamera.lookAt(0, 0, 0);

      waveRenderer.setSize(cameraWidth, cameraHeight);
      waveComposer = new EffectComposer(waveRenderer);
      waveComposer.setPixelRatio(EFFECT_PR);

      waveRenderPass = new RenderPass(waveScene, waveCamera);
      waveComposer.addPass(waveRenderPass);

      waveBloomPass = new UnrealBloomPass(
        new THREE.Vector2(cameraWidth, cameraHeight),
        1.0, 0.68, 0.0
      );
      waveBloomPass.resolution.set(cameraWidth * 0.5, cameraHeight * 0.5);
      waveComposer.addPass(waveBloomPass);

      grainPass = createFilmGrainPass();
      waveComposer.addPass(grainPass);

      createInstancedBars();
      setupPointerTracking();
      updateGainMultiplier();
      waveCameraInitialized = true;
    }

    let pendingW = 0, pendingH = 0, heavyResizeTimer = null;
    function onResize(newW, newH) {
      if (!waveCameraInitialized) return;
      pendingW = newW;
      pendingH = newH;

      cameraWidth = newW;
      cameraHeight = newH;
      waveCamera.left = -cameraWidth / 2;
      waveCamera.right = cameraWidth / 2;
      waveCamera.top = cameraHeight / 2;
      waveCamera.bottom = -cameraHeight / 2;
      waveCamera.updateProjectionMatrix();

      const waveWidth = cameraWidth * 0.9;
      const gap = FIXED_BAR_GAP;
      const barCount = Math.min(
        MAX_BARS,
        Math.max(1, Math.floor((waveWidth + gap) / (FIXED_BAR_WIDTH + gap)))
      );

      if (barCount !== currentBarCount) {
        currentBarCount = barCount;
        createInstancedBars();
      } else {
        const totW = barCount * (FIXED_BAR_WIDTH + gap) - gap;
        const startX = -totW / 2 - 50;
        const aX = instancedBars.geometry.getAttribute("aXPos");
        const aT = instancedBars.geometry.getAttribute("aPosNorm");

        for (let i = 0; i < barCount; i++) {
          const x = startX + FIXED_BAR_WIDTH / 2 + i * (FIXED_BAR_WIDTH + gap);
          const t = barCount > 1 ? i / (barCount - 1) : 0;
          aX.array[i] = aX.array[i + barCount] = x;
          aT.array[i] = aT.array[i + barCount] = t;
        }
        aX.needsUpdate = true;
        aT.needsUpdate = true;
      }

      barMaterial.uniforms.uHalfW.value = cameraWidth * 0.5;
      updateGainMultiplier();
      updateGlowDistance();

      clearTimeout(heavyResizeTimer);
      heavyResizeTimer = setTimeout(applyHeavyResize, 10);
      rect = waveRenderer.domElement.getBoundingClientRect();
    }

    function applyHeavyResize() {
      heavyResizeTimer = null;
      waveRenderer.setPixelRatio(EFFECT_PR);
      waveRenderer.setSize(pendingW, pendingH);
      waveComposer.setSize(pendingW, pendingH);
      waveBloomPass?.setSize(pendingW, pendingH);
      grainPass?.setSize(pendingW, pendingH);
      grainPass.uniforms.grainScale.value = 0.5;
    }

    function disposeWaveScene() {
      gsap.globalTimeline.clear();
      waveScene.traverse(obj => {
        if (obj.isMesh) {
          obj.geometry.dispose();
          if (Array.isArray(obj.material)) {
            obj.material.forEach(m => m.dispose());
          } else {
            obj.material.dispose();
          }
        }
      });
      grainPass?.dispose?.();
      waveBloomPass?.dispose?.();
      waveComposer?.dispose?.();
      waveRenderer?.dispose?.();
      instancedBars = null;
    }
    window.addEventListener('beforeunload', disposeWaveScene);

    // --- Main ---
    const ro = new ResizeObserver(entries => {
      for (const e of entries) {
        if (e.target === waveContainer) {
          onResize(e.contentRect.width, e.contentRect.height);
        }
      }
    });
    ro.observe(waveContainer);

    const initApp = () => {
      showScene1();
      attachFakeRuntimeHandlers();
      applyMotionPreset("idle", 0.01, "none");
      autoSizeComposer();
      animateHeroIntro();
    };

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }

    document.addEventListener("visibilitychange", () => {
      document.hidden ? gsap.globalTimeline.pause() : gsap.globalTimeline.resume();
    });
  </script>
</body>

</html>
